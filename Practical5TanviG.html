<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Responsive Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">My Website</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="container text-center my-5">
    <h1>Welcome to My Website</h1>
    <p class="lead">This is a responsive page using Bootstrap</p>
    <button class="btn btn-primary">Get Started</button>
</div>

<!-- Grid Section -->
<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3">
                <h4>Column 1</h4>
                <p>Responsive content using Bootstrap grid.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Column 2</h4>
                <p>Adjusts automatically on smaller screens.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Column 3</h4>
                <p>Stacks vertically on mobile devices.</p>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 My Website</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
